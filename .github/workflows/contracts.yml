name: Contracts CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/contracts/**'
      - '.github/workflows/contracts.yml'
  pull_request:
    paths:
      - 'apps/contracts/**'
      - '.github/workflows/contracts.yml'

# Least-privilege token scopes for security.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: contracts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: apps/contracts

jobs:
  contracts:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt, clippy
          targets: wasm32v1-none

      - name: Cache cargo registry and build output
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          workspaces: apps/contracts

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy (warnings as errors)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

      - name: Build workspace (release)
        run: cargo build --release

      - name: Build WASM artifacts
        run: cargo build --release --target wasm32v1-none

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: soroban-wasm
          path: apps/contracts/target/wasm32v1-none/release/*.wasm
          if-no-files-found: error
