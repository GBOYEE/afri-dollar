name: Contracts CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/contracts/**'
      - '.github/workflows/contracts.yml'
  pull_request:
    paths:
      - 'apps/contracts/**'
      - '.github/workflows/contracts.yml'

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: contracts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: apps/contracts

jobs:
  contracts:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          components: rustfmt, clippy
          targets: wasm32v1-none

      - name: Cache cargo registry and build output
        uses: Swatinem/rust-cache@54e2af0a8339c0435fa1de94002eab349a2f15ef # v2.7.3
        with:
          workspaces: apps/contracts

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy (warnings as errors)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

      - name: Build workspace (release)
        run: cargo build --release

      - name: Build WASM artifacts
        run: cargo build --release --target wasm32v1-none

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@604373da6381bf24206979c74d06a550515601b9 # v4.4.1
        with:
          name: soroban-wasm
          path: apps/contracts/target/wasm32v1-none/release/*.wasm
          if-no-files-found: error
